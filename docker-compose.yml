version: '3.8'

services:
  tracking-consumer:
    build: .
    container_name: tracking-consumer-dev
    volumes:
      - ./config:/app/config:ro
      - ./logs:/var/log/tracking-consumer
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    depends_on:
      - postgres
      - kafka
    networks:
      - siscom-network

volumes:
  postgres_data:

networks:
  tracking-network:
    driver: bridge